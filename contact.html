---
layout: default
title: Contact Us
load_web3: true
---

<section class="section page-intro contact-intro">
  <div class="container">
    <div class="section-header centered">
      <div class="section-label">Contact</div>
      <h1 class="section-title">Get in Touch</h1>
      <p class="section-desc">
        If you have a question or would like to reach out, use the form below.
      </p>
    </div>

    <div class="contact-form-wrap">
      <div class="feature-card">
        <div class="feature-main center-text">
          <div class="feature-title" style="font-size: 32px">
            Send a Message
          </div>
          <span class="feature-subtitle" style="display: block">
            Messages are sent directly.
          </span>
        </div>

        <form
          action="https://api.web3forms.com/submit"
          method="POST"
          class="contact-form"
        >
          <input
            type="hidden"
            name="access_key"
            value="21842a89-fa6e-402f-a7e9-dd2214a15b74"
          />
          <input
            type="hidden"
            name="redirect"
            value="https://novawrightstudios.com/thanks.html"
          />
          <input
            type="hidden"
            name="subject"
            value="New message from NovaWright Studios"
          />
          <input
            type="hidden"
            name="from_name"
            value="NovaWright Studios Contact Form"
          />
          <input type="checkbox" name="botcheck" style="display: none" />
          <input type="hidden" name="from_page" value="contact" />

          <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea
              id="message"
              name="message"
              class="form-textarea"
              rows="7"
              required
            ></textarea>
          </div>

          <div class="form-group newsletter-optin">
            <input type="hidden" name="newsletter_optin" value="No" />

            <label class="checkbox-label" for="newsletter_optin">
              <input
                type="checkbox"
                id="newsletter_optin"
                name="newsletter_optin"
                value="Yes"
              />
              Yes, I would like to receive occasional email updates and
              newsletter content from NovaWright Studios.
            </label>

            <div id="newsletter-signup-panel" class="newsletter-signup-panel">
              <div class="newsletter-inline-copy">
                Please confirm your subscription below.
              </div>
              <div class="newsletter-form">
                <div class="ml-embedded" data-form="vDCP03"></div>
              </div>
            </div>
          </div>

          <div
            class="hero-actions"
            style="justify-content: center; margin-top: 24px"
          >
            <button type="submit" id="submitBtn" class="btn btn-primary">
              Send Message
            </button>
            <a href="index.html" class="btn btn-outline">Back to Home</a>
          </div>

          <div id="newsletter-after-submit" class="newsletter-after-submit">
            <div class="newsletter-inline-copy">
              Want updates too? Subscribe below.
            </div>
            <div class="newsletter-form">
              <div class="ml-embedded" data-form="vDCP03"></div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
